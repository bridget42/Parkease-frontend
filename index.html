<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkEase - login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="logo-area">
                <div class="container-fluid">
                    <!-- Logo -->
                    <div class="d-flex align-items-center gap-3">
                        <div class="bg-primary text-white p-3 rounded-3 d-flex align-items-center justify-content-center"
                            style="width: 45px; height: 45px;">
                            <i class="bi bi-car-front-fill fs-3"></i>
                        </div>
                        <div>
                            <h2 class="mb-1 fw-bold fs-2">ParkEase</h2>
                            <p class="mb-0 text-primary small fw-medium text-uppercase" style="letter-spacing: 2px;">
                                Premium Parking</p>
                        </div>

                        <form id="loginForm"><br>
                            <div class="form-group">
                                <label for="username">Username:</label>
                                <input type="text" id="username" name="username" required>
                            </div>
                            <div class="form-group">
                                <label for="password">Password:</label>
                                <input type="password" id="password" name="password" required>
                                <label><br>
                                    <input type="checkbox" checked="checked" name="remember" style="margin-bottom:15px">
                                    Remember me
                                </label>

                                <p>By creating an account you agree to our <a href="terms-and-policy.html" style="color:dodgerblue">Terms &
                                        Privacy</a>.</p><br>

                                <button type="submit" class="btn-primary">Login</button>

                                <div id="loginError" class="error-message"></div>
                        </form>
                    </div>
                </div>
                <script src="js/auth.js"></script>
</body>

</html>
