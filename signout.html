<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkEase - Vehicle Sign-out</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <!-- Same sidebar as before -->
        </aside>

        <main class="main-content">
            <!-- Search Bar -->
            <div class="search-section">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchReceipt" placeholder="Search Receipt by ID or Plate Number">
                    <button id="searchBtn" class="btn-primary">Search</button>
                </div>
            </div>

            <div class="signout-layout">
                <!-- Left Panel - Vehicle Details -->
                <div class="vehicle-details-panel">
                    <div class="panel-header">
                        <h2>Vehicle & Arrival Details</h2>
                        <span class="status-badge pending">PENDING SIGN-OUT</span>
                    </div>
                    
                    <div id="vehicleDetails" class="vehicle-info">
                        <!-- Will be populated by JS -->
                        <div class="no-data">Search for a vehicle to begin</div>
                    </div>

                    <!-- Receiver Information -->
                    <div class="receiver-form">
                        <h3>Receiver Information</h3>
                        <form id="receiverForm">
                            <div class="form-group">
                                <label for="receiverName">Full Name *</label>
                                <input type="text" id="receiverName" required>
                            </div>
                            <div class="form-group">
                                <label for="receiverPhone">Phone Number *</label>
                                <input type="tel" id="receiverPhone" required>
                            </div>
                            <div class="form-group">
                                <label for="receiverNIN">NIN Number *</label>
                                <input type="text" id="receiverNIN" required>
                            </div>
                            <div class="form-group">
                                <label for="receiverGender">Gender</label>
                                <select id="receiverGender">
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </form>
                    </div>

                    <div class="action-buttons">
                        <button id="confirmPayment" class="btn-primary" disabled>
                            <i class="fas fa-check-circle"></i> Confirm Payment & Sign-out
                        </button>
                        <button id="cancelBtn" class="btn-secondary">
                            <i class="fas fa-times"></i> Cancel
                        </button>
                    </div>
                </div>

                <!-- Right Panel - Receipt Preview -->
                <div class="receipt-preview-panel">
                    <div class="panel-header">
                        <h2>Receipt Preview</h2>
                        <button id="printReceipt" class="btn-outline" disabled>
                            <i class="fas fa-print"></i> Print
                        </button>
                    </div>
                    
                    <div id="receiptContent" class="receipt-content">
                        <!-- Will be populated by JS -->
                        <div class="no-data">Complete sign-out to generate receipt</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/signout.js"></script>
</body>
</html>
